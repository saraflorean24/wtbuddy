spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/wtbuddy
    username: wtbuddy
    password: wtbuddy123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
#        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

server:
  port: 8080