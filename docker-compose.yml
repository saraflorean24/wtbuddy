version: "3.8"

services:
  wtbuddy-db:
    image: postgis/postgis:13-3.1-alpine
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: wtbuddy
      POSTGRES_DB: wtbuddy
      POSTGRES_PASSWORD: wtbuddy123
    volumes:
      - wtbuddy-db-vol:/var/lib/postgresql/data

  wtbuddy-backend:
    build: ./backend
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://wtbuddy-db:5432/wtbuddy
      SPRING_DATASOURCE_USERNAME: wtbuddy
      SPRING_DATASOURCE_PASSWORD: wtbuddy123
    depends_on:
      - wtbuddy-db

volumes:
  wtbuddy-db-vol: